<!DOCTYPE html> 
<html lang="en"> 
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Flexbox Layout</title> 
 
    <style> 
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        } 
 
        body { 
            font-family: Arial, sans-serif; 
        } 
 
         
        header { 
            background-color: #333; 
            color: white; 
            padding: 15px; 
            text-align: center; 
        } 
 
         
        .container { 
            display: flex; 
            min-height: 80vh; 
        } 
 
         
        aside { 
            width: 25%; 
            background-color: #f4f4f4; 
            padding: 20px; 
 
            
            display: flex; 
            flex-direction: column; 
            justify-content: center;  
            align-items: center;      
        } 
 
         
        main { 
            width: 75%; 
            padding: 20px; 
 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        } 
 
        
        footer { 
            background-color: #333; 
            color: white; 
            text-align: center; 
            padding: 10px; 
        } 
 
         
        @media (max-width: 768px) { 
            .container { 
                flex-direction: column; 
            } 
 
            aside, main { 
                width: 100%; 
            } 
        } 
    </style> 
</head> 
<body> 
 
     
    <header> 
        <h1>My Website</h1> 
    </header> 
 
    
    <div class="container"> 
         
         
        <aside> 
            <p>Sidebar</p> 
        </aside> 
 
         
        <main> 
            <p>Main Content Area</p> 
        </main> 
 
    </div> 
 
    
    <footer> 
        <p>© 2026 My Website</p> 
    </footer> 
 
</body> 
</html>
