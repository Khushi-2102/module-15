<!DOCTYPE html> 
<html lang="en"> 
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Responsive Layout</title> 
 
    <style> 
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        } 
 
        body { 
            font-family: Arial, sans-serif; 
            font-size: 18px; 
        } 
 
         
        nav { 
            background-color: #333; 
            color: white; 
            padding: 15px; 
            display: flex; 
            justify-content: space-between; 
        } 
 
        nav a { 
            color: white; 
            text-decoration: none; 
            margin: 0 10px; 
        } 
 
         
        .container { 
            display: flex; 
            padding: 20px; 
            gap: 20px; 
        } 
 
        .column { 
            flex: 1; 
            padding: 20px; 
            background-color: #f4f4f4; 
        } 
 
         
        footer { 
            background-color: #333; 
            color: white; 
            text-align: center; 
            padding: 10px; 
        } 
 
         
        @media (max-width: 768px) { 
            body { 
                font-size: 14px;  
            } 
 
            nav { 
                flex-direction: column; 
                text-align: center; 
            } 
 
            .container { 
                flex-direction: column;  
                padding: 10px; 
            } 
 
            .column { 
                padding: 15px; 
            } 
        } 
    </style> 
</head> 
<body> 
 
     
    <nav> 
        <div>My Website</div> 
        <div> 
            <a href="#">Home</a> 
            <a href="#">About</a> 
            <a href="#">Contact</a> 
        </div> 
    </nav> 
 
     
    <div class="container"> 
        <div class="column"> 
            <h2>Column 1</h2> 
            <p>This is the first column content.</p> 
        </div> 
 
        <div class="column"> 
            <h2>Column 2</h2> 
            <p>This is the second column content.</p> 
        </div> 
    </div> 
 
     
    <footer> 
        <p>© 2026 My Website</p> 
    </footer> 
 
</body> 
</html>
