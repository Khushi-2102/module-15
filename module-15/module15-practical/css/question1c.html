<!DOCTYPE html> 
<html lang="en"> 
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Styled Contact Form</title> 
 
     
    <style> 
         
        #contactForm { 
            background-color: #f9f9f9; 
            width: 300px; 
            padding: 20px; 
            margin: 20px auto; 
            border: 1px solid #ccc; 
            border-radius: 10px; 
        } 
 
        .form-group { 
            margin-bottom: 15px; 
        } 
 
         
        .input-field { 
            width: 100%; 
            padding: 8px; 
            margin-top: 5px; 
            border: 1px solid #ccc; 
            border-radius: 5px; 
        } 
 
         
        #submitBtn { 
            width: 100%; 
            padding: 10px; 
            background-color: blue; 
            color: white; 
            border: none; 
            border-radius: 5px; 
            cursor: pointer; 
        } 
 
         
        #submitBtn:hover { 
            background-color: darkblue; 
        } 
 
        
         
    </style> 
</head> 
<body> 
 
    <h2>Contact Us</h2> 
 
    <form id="contactForm"> 
 
        <div class="form-group"> 
            <label for="name">Full Name:</label> 
            <input type="text" id="name" class="input-field" required> 
        </div> 
 
        <div class="form-group"> 
            <label for="email">Email:</label> 
            <input type="email" id="email" class="input-field" required> 
        </div> 
 
        <div class="form-group"> 
            <label for="phone">Phone:</label> 
            <input type="tel" id="phone" class="input-field"> 
        </div> 
 
        <div class="form-group"> 
            <label for="subject">Subject:</label> 
            <select id="subject" class="input-field"> 
                <option>Select</option> 
                <option>General</option> 
                <option>Support</option> 
            </select> 
        </div> 
 
        <div class="form-group"> 
            <label for="message">Message:</label> 
            <textarea id="message" class="input-field"></textarea> 
        </div> 
 
        <button id="submitBtn">Submit</button> 
 
    </form> 
</body> 
</html>
